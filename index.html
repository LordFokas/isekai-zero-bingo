<!DOCTYPE html>
<html>
<head>
	<title>Isekai Zero Bingo</title>
	<link rel="icon" href="http://isekai.world/favicon.png" />

	<style type="text/css">
		html, body{ background-color: #020920; padding: 0px; margin:  0px; overflow: hidden; position: relative; }
		#isekai{ position: relative; display: inline-block; width: calc(100vw - 70vh); height: 100vh; }
		#isekai iframe{
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border: 0px;
		}
		#card{ height: 100vh; width: 70vh; float: right; background-image: url('./bingo.png'); background-size: cover; box-sizing: border-box; padding-left: 0.7vh; }
		#grid{ width: 56.4vh; height: 55.6vh; margin: 26.9vh auto 0 auto; border: 2px dashed transparent; box-sizing: border-box; }
		#chat{
			width: 57.2vh;
			height: 5vh;
			margin: 6.5vh auto 0 auto;
			background-color: rgba(255, 255, 255, 0.5);
			box-sizing: border-box;
			font-size: 3vh; font-family: 'verdana';
			line-height: 5vh;
			color: black;
			text-align: center;
			display: none;
		}
		.square{
			box-sizing: border-box;
			border: 2px dotted transparent;
			width: 17.7%;
			height: 17.6%;
			margin-top: 1.7%;
			margin-left: 1.8%;
			margin-right: 0.2%;
			cursor: pointer;
			display: inline-block;
		}
		.square[checked]{
			background-image: url('./blob.png');
			background-size: cover;
		}
	</style>
	<script type="text/javascript">
		localStorage.setItem("version", "0");
		let progress = localStorage.getItem("progress");
		let checked = progress ? JSON.parse(progress) : [];
		let init = checked.length == 0;
		
		function makeGrid() {
			let grid = document.querySelector("#grid");
			for(let i = 0; i < 25; i++) {
				if(init) checked[i] = false;
				let square = document.createElement("div");
				square.setAttribute("class", "square");
				if(i == 12) square.setAttribute("style", "visibility: hidden;");
				square.onclick = function() {
					let id = i;
					checked[id] = !checked[id];
					update(square, id);
					localStorage.setItem("progress", JSON.stringify(checked));
				}
				update(square, i);
				grid.appendChild(square);
			}
		}

		function update(square, id) {
			if(checked[id]){
				square.setAttribute("checked", "");
			}else{
				square.removeAttribute("checked");
			}
		}
	</script>
</head>
<body onload="makeGrid();">
	<div id="isekai">
		<iframe src="https://isekai.world"></iframe>
	</div>
	<div id="card">
		<div id="grid"></div>
		<div id="chat">unknown</div>
	</div>
</body>

</html>
